name: Publish release

on:
  workflow_dispatch:
    inputs:
      isPreRelease:
        description: 'Tag created is a pre-release tag'
        required: true
        default: 'false'
      preReleaseSuffix:
        description: 'The text that will be suffixed to the Git tag. e.g., rc1'
        required: false
        default: ''

permissions:
  id-token: write
  contents: write

jobs:
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21.0.3'
      - name: Set version env variable
        id: version-set
        run: |
          SHORT_VERSION=$(grep -w 'version' gradle.properties | cut -d= -f2 | sed 's/-SNAPSHOT//' | xargs)
          UPDATE_LEVEL=$(grep -w 'updateLevel' gradle.properties | cut -d= -f2 | xargs)
          RELEASE_VERSION="$SHORT_VERSION"
          if [ -n "$UPDATE_LEVEL" ] && [ "$UPDATE_LEVEL" != "0" ]; then
            RELEASE_VERSION="${SHORT_VERSION}.${UPDATE_LEVEL}"
          fi
          TAGGED_VERSION="$RELEASE_VERSION"

          if [ -n "${{ github.event.inputs.preReleaseSuffix }}" ]; then
            TAGGED_VERSION="$RELEASE_VERSION-${{ github.event.inputs.preReleaseSuffix }}"
          fi

          echo "VERSION=$SHORT_VERSION" >> "$GITHUB_ENV"
          echo "GIT_TAG=$TAGGED_VERSION" >> "$GITHUB_ENV"
          echo "::set-output name=sversion::$SHORT_VERSION"
          echo "::set-output name=taggedVersion::$TAGGED_VERSION"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release pack
        env:
          GITHUB_TOKEN: ${{ github.repository_owner == 'ballerina-platform' && secrets.BALLERINA_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          packageUser: ${{ github.repository_owner == 'ballerina-platform' && secrets.BALLERINA_BOT_USERNAME || github.actor }}
          packagePAT: ${{ github.repository_owner == 'ballerina-platform' && secrets.BALLERINA_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          githubAccessToken: ${{ secrets.GITHUB_TOKEN }}
          packageRepoOwner: ${{ github.repository_owner }}
        run: |
          LANG_VERSION=$(grep -w 'ballerinaLangVersion' gradle.properties | cut -d= -f2 | xargs)
          DEVTOOLS_VERSION=$(grep -w 'devToolsVersion' gradle.properties | cut -d= -f2 | xargs)
          ./gradlew build -x project-api-tests:test -Pversion="${VERSION}" -x test -PballerinaLangVersion="${LANG_VERSION}" -PdevToolsVersion="${DEVTOOLS_VERSION}"

      - name: Create WSO2 Integrator wrapper zip
        run: |
          INTEGRATOR_VERSION="5.0.0"
          SHORT_VERSION="${{ steps.version-set.outputs.sversion }}"
          UPDATE_LEVEL=$(grep -w 'updateLevel' gradle.properties | cut -d= -f2 | xargs)
          PACK_VERSION="$SHORT_VERSION"
          if [ -n "$UPDATE_LEVEL" ] && [ "$UPDATE_LEVEL" != "0" ]; then
            PACK_VERSION="${SHORT_VERSION}.${UPDATE_LEVEL}"
          fi
          ROOT_DIR="wso2-integrator-${INTEGRATOR_VERSION}"
          SOURCE_ZIP="ballerina/build/distributions/ballerina-${SHORT_VERSION}.zip"
          WORK_DIR="${RUNNER_TEMP}/wso2-integrator-pack"

          rm -rf "${WORK_DIR}"
          mkdir -p "${WORK_DIR}/${ROOT_DIR}"
          unzip -q "${SOURCE_ZIP}" -d "${WORK_DIR}/${ROOT_DIR}"
          if [ "${PACK_VERSION}" != "${SHORT_VERSION}" ] && [ -d "${WORK_DIR}/${ROOT_DIR}/ballerina-${SHORT_VERSION}" ]; then
            mv "${WORK_DIR}/${ROOT_DIR}/ballerina-${SHORT_VERSION}" "${WORK_DIR}/${ROOT_DIR}/ballerina-${PACK_VERSION}"
          fi

          (cd "${WORK_DIR}" && zip -q -r "${GITHUB_WORKSPACE}/${ROOT_DIR}.zip" "${ROOT_DIR}")
          echo "FINAL_ASSET=${ROOT_DIR}.zip" >> "${GITHUB_ENV}"

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ github.repository_owner == 'ballerina-platform' && secrets.BALLERINA_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          tag_name: "v${{ steps.version-set.outputs.taggedVersion }}"
          release_name: "v${{ steps.version-set.outputs.taggedVersion }}"
          body: "Release pack for version ${{ steps.version-set.outputs.sversion }}"
          draft: false
          prerelease: ${{ github.event.inputs.isPreRelease }}

      - name: Upload integrator zip artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.repository_owner == 'ballerina-platform' && secrets.BALLERINA_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_name: ${{ env.FINAL_ASSET }}
          asset_path: ${{ github.workspace }}/${{ env.FINAL_ASSET }}
          asset_content_type: application/octet-stream
